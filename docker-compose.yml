version: '3.8'

services:
  # MongoDB
  mongo:
    image: mongo:6
    container_name: visitor-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    # For simplicity, you can also use no auth; adjust your connection string accordingly

  # Redis
  redis:
    image: redis:7-alpine
    container_name: visitor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "9000:9000"
    depends_on:
      - auth-service
      - visitor-service
    environment:
      - PORT=9000
      - AUTH_SERVICE_URL=http://auth-service:8001
      - VISITOR_SERVICE_URL=http://visitor-service:8002
    # Also pass any other env vars (JWT_SECRET, etc.) from a .env file
    env_file:
      - .env

  # Auth Service
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - mongo
      - redis
    environment:
      - PORT=8001
      - MONGO_URI=mongodb://root:example@mongo:27017/auth?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    env_file:
      - .env

  # Visitor Service (main)
  visitor-service:
    build: ./services/visitor-services
    container_name: visitor-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    depends_on:
      - mongo
      - redis
    environment:
      - PORT=8002
      - MONGO_URI=mongodb://root:example@mongo:27017/visitor?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    env_file:
      - .env

  # Notification Worker
  notification-worker:
    build: ./services/visitor-services
    container_name: notification-worker
    restart: unless-stopped
    depends_on:
      - redis
      - mongo
    command: node workers/notificationWorker.js
    environment:
      - MONGO_URI=mongodb://root:example@mongo:27017/visitor?authSource=admin
      - REDIS_URL=redis://redis:6379
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    env_file:
      - .env

  # Expiry Worker
  expiry-worker:
    build: ./services/visitor-services
    container_name: expiry-worker
    restart: unless-stopped
    depends_on:
      - redis
      - mongo
    command: node workers/expiryWorker.js
    environment:
      - MONGO_URI=mongodb://root:example@mongo:27017/visitor?authSource=admin
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env

  # Audit Worker
  audit-worker:
    build: ./services/visitor-services
    container_name: audit-worker
    restart: unless-stopped
    depends_on:
      - redis
      - mongo
    command: node workers/auditWorker.js
    environment:
      - MONGO_URI=mongodb://root:example@mongo:27017/visitor?authSource=admin
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env

volumes:
  mongo_data:
  redis_data:
  